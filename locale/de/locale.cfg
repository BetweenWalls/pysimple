# locale.cfg (German)

[mod-name]
pysimple=Pyanodons Streamlined

[mod-description]
pysimple=Bietet Optionen, um das Spielerlebnis in Py zu optimieren. Die Menüs ist übersichtlicher, die Grafiken wurden aktualisiert, Namen und Beschreibungen wurden zur besseren Auffindbarkeit und Klarheit angepasst, der Technologiebaum wurde übersichtlicher gestaltet, die Rezeptgeschwindigkeiten wurden neu ausbalanciert, um eine graduelle Expansion zu ermöglichen, und vieles mehr. Alle Änderungen lassen sich in den Einstellungen vollständig anpassen.

[mod-setting-name]
pysimple-recipe-menu=Menüreorganisation
pysimple-graphics=Audiovisuelle Anpassungen
pysimple-descriptions=Anpassung der Beschreibungen
pysimple-tech-tree=Anpassung der Technologien
pysimple-storage-tanks=Anpassung der Lagertankkapazitäten
pysimple-storage-chests=Anpassung der Lagerraumkapazitäten
pysimple-faster-recipes=Anpassung gewisser Rezeptgeschwindigkeiten
pysimple-brains=Anpassung der Vatbrain-Gehirne
pysimple-misc=Sonstige Anpassungen

[mod-setting-description]
pysimple-recipe-menu=Ordnet alle Gegenstände neu, sodass sie anhand von Gemeinsamkeiten in 7 Gruppen eingeteilt werden, anstatt danach, aus welcher Pymod sie stammen.\nGruppen für [font=default-bold][color=255,230,192]Materialien[/color][/font], [font=default-bold][color=255,230,192]Flüssigkeiten[/color][/font], sowie [font=default-bold][color=255,230,192]Leben[/color][/font] werden zusätzlich zu [font=default-semibold]Logistik[/font], [font=default-semibold]Produktion[/font], [font=default-semibold]Zwischenprodukte[/font], und [font=default-semibold]Kampf[/font] aus dem Basisspiel verwendet.
pysimple-graphics=Kleine Anpassungen an einigen Symbolen, Sprites, Schaltkreisverbindungen, Kartenfarben und Sounds.
pysimple-descriptions=Kleine Anpassungen an einigen Namen, Beschreibungen und Befehlen.
pysimple-tech-tree=Kleine Anpassungen an der Position einiger Technologien und Rezepten innerhalb des Technologiebaums.
pysimple-storage-tanks=Standardisiert die Kapazität von Flüssigkeitslagertanks basierend auf ihren Abmessungen, damit sie aus ästhetischen Gründen flexibler eingesetzt werden können.\nIm Vergleich zur Einstellung von Py-Industie betrifft dies nur die Py-Tanks 1000, 1500, 4000 und 5000.
pysimple-storage-chests=Standardisiert die Kapazität von Lagercontainern basierend auf ihren Abmessungen. Betrifft nur Container und Schuppen.
pysimple-faster-recipes=Erhöht die Geschwindigkeit einiger Rezepte zu einem allmählicheren Anstieg. Rezepte niedriger Stufen sind am stärksten betroffen, jede nachfolgende Stufe ist weniger betroffen, wobei die höchsten Stufen unverändert bleiben.\nDa weniger Gebäude benötigt werden, verbrauchen einige Gebäude mehr Energie, um dies auszugleichen.\nSpezifische Änderungen sind in den Bauplan-/Objektbeschreibungen vermerkt.
pysimple-brains=Reduziert die Menge an Gehirnen, die für Vatbrain Patronen benötigt werden.\nReduziert die Menge an Chitin, die für Biogerüste benötigt werden, um das Drucken von Gehirnen praktikabler zu machen.
pysimple-misc=Mehrere relativ kleine Änderungen:\nDie Rezepte für Salzwasser „Kies“ und „Stein“ wurden angepasst, damit das „schwierigere“ Rezept nicht schlechter ist.\nPasst den erste Akkumulator-Bauplan so an, dass weniger Batterien verbraucht werden.\nFügt Baupläne zur Verbesserung unterirdischer Rohren hinzu.

[string-mod-setting]
pysimple-descriptions-1=Nein
pysimple-descriptions-2=Ja
pysimple-descriptions-3=Ja (Multi-Produktnamen)
pysimple-tech-tree-1=Nein
pysimple-tech-tree-2=Ja
pysimple-tech-tree-3=Ja (Feinde deaktiviert)

[string-mod-setting-description]
pysimple-descriptions-1=
pysimple-descriptions-2=Einige Bezeichnungen und Beschreibungen sind nicht ganz optimal. Hiermit werden sie zur besseren Verständlichkeit aktualisiert.
pysimple-descriptions-3=Neben anderen Änderungen werden die Namen von Multiprodukt-Rezepten künftig eine Liste der Produkte enthalten.
pysimple-tech-tree-1=
pysimple-tech-tree-2=Manche Technologien und Rezepte werden früher als nötig freigeschaltet und überladen den Technologiebaum mit irrelevanten Informationen. Hierdurch werden sie tiefer in dem Technologiebaum verschoben, in denen sie nützlich werden.
pysimple-tech-tree-3=Frühe irrelevante Militärtechnologien werden ebenfalls weiter nach unten im Technologiebaum verschoben.

