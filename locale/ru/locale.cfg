pysimple-descriptions-1=Нет
pysimple-descriptions-2=Да (большинство изменений)
pysimple-descriptions-3=Да (все изменения)
pysimple-tech-tree-1=Нет
pysimple-tech-tree-2=Да
pysimple-tech-tree-3=Да (враги отключены)

[string-mod-setting-description]
pysimple-descriptions-1=
pysimple-descriptions-2=Некоторые названия и описания неидеальны. Эта настройка обновляет их для большей ясности.
pysimple-descriptions-3=В дополнение к другим изменениям, названия рецептов, состоящих из нескольких продуктов, будут включать список продуктов.
pysimple-tech-tree-1=
pysimple-tech-tree-2=Некоторые технологии и рецепты становятся доступны раньше, чем это необходимо, загромождая дерево технологий ненужной информацией. Эта настройка перемещает их на более глубокие позиции в дереве технологий, где они становятся полезными в первую очередь.
pysimple-tech-tree-3=Ранние бесполезные военные технологии также будут перемещены глубже в технологическое древо.

