# locale.cfg (Russian)

[mod-name]
pysimple=Pyanodon Оптимизированный

[mod-description]
pysimple=Мод предоставляет настройки для более удобного использования сборки модов Pyanodon. Организует меню рецептов, обновляет их графику, изменяет названия и описания для удобства поиска и наглядности, увеличивает процент локализации, уменьшает загромождённость дерева технологий, меняет баланс скорости рецептов для более плавного масштабирования и многое другое. Все изменения полностью настраиваются через настройки.

[mod-setting-name]
pysimple-recipe-menu=Реорганизация меню
pysimple-graphics=Аудиовизуальные корректировки
pysimple-descriptions=Корректировки описаний
pysimple-tech-tree=Корректировки технологий
pysimple-storage-tanks=Ребаланс вместимости жидкостных хранилищ
pysimple-storage-chests=Ребаланс вместимости контейнеры для хранения
pysimple-energy=Ребаланс энергия
pysimple-decay=Ребаланс время порчи
pysimple-brains=Ребаланс картриджей для мозга-в-колбе
pysimple-faster-recipes=Ребаланс скорости рецептов
pysimple-misc=Другие балансные правки

[mod-setting-description]
pysimple-recipe-menu=Реорганизует все предметы, распределяя их по 7 группам на основе внутриигрового сходства, а не на основе того, из какого pymod они взяты.\nГруппы [font=default-bold][color=255,230,192]Материалы[/color][/font], [font=default-bold][color=255,230,192]Жидкости[/color][/font] и [font=default-bold][color=255,230,192]Жизнь[/color][/font] теперь идут в дополнение к группам [font=default-semibold]Логистика[/font], [font=default-semibold]Производство[/font], [font=default-semibold]Промежуточные продукты[/font] и [font=default-semibold]Оружие[/font] из базовой игры.
pysimple-graphics=Вносит незначительные изменения в некоторые иконки, соединения проводов, цвета карты и звуки.
pysimple-descriptions=носит незначительные изменения в некоторые имена и описания.
pysimple-tech-tree=Вносит незначительные изменения в некоторые позиции технологий и рецептов в древе технологий.
pysimple-storage-tanks=Стандартизирует вместимость резервуаров для хранения в зависимости от их размеров, чтобы их можно было более свободно использовать в эстетических целях.\nПо сравнению с настройкой из Py Industry, это изменяет только py-танки 1000, 1500, 4000 и 5000.
pysimple-storage-chests=Стандартизирует вместимость контейнеров для хранения в зависимости от их размеров. Меняет только малый и средний склад.
pysimple-energy=Энергопотребление модулей высоких уровней приведено в соответствие с обеспечиваемой ими производительностью.
pysimple-decay=Заставляет некоторые предметы портиться быстрее. Воздействует на целлюлозу, агар и инкубируемые чашки Петри.
pysimple-brains=Уменьшает количество мозгов, необходимых для картриджей для мозга-в-колбе.\nУменьшает количество хитина, необходимого для биокаркасов, чтобы сделать печать колб из них более жизнеспособной.
pysimple-faster-recipes=Увеличивает скорость выполнения некоторых рецептов. Делает процесс масштабирования более плавным. Рецепты низкого уровня затронуты сильнее всего, каждый последующий уровень затронут меньше, а самый высокий уровень остаётся неизменным.\nПоскольку требуется меньше зданий, некоторые здания потребляют больше энергии для компенсации.\nКонкретные изменения указаны в описаниях рецептов/сущностей.
pysimple-misc=Несколько относительно небольших изменений:\nИзменяет рецепты соленой воды из «гравия» и «камня», чтобы более жесткий рецепт не стал хуже.\nНастраивает первый аккумулятор на более быстрый заряд и разряд.\nКорректирует рецепты начальной обработки хитина, увеличивая выход продукции.\nКорректирует рецепт еды для рабочих, повышая объемы производства, и увеличивает размер стопки этой еды.\nКорректирует ауг для повышения их топливной ценности.\nКорректирует рецепт шлама из оксида железа, делая его более выгодным по сравнению с более простым вариантом.\nКорректирует параметры процесса переработки газа угольных пластов для снижения расхода кислорода и горячего воздуха.\nКорректирует рецепты разделки фагнотов, чтобы получать больше газовых пузырей.\nКорректирует значения T.U.R.D. для лесного хозяйства (быстрорастущие породы), деревообрабатывающего предприятия и рыбной фермы.\nДобавляет рецепты для улучшения железных подземных труб в ниобиевые.

